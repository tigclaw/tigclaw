<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Abstract claw marks forming a "T" shape -->
  <defs>
    <linearGradient id="claw1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="claw2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="claw3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
  </defs>
  <!-- Three diagonal claw slashes -->
  <path d="M8 4 L22 44" stroke="url(#claw1)" stroke-width="5" stroke-linecap="round"/>
  <path d="M20 4 L34 44" stroke="url(#claw2)" stroke-width="5" stroke-linecap="round"/>
  <path d="M32 4 L46 44" stroke="url(#claw3)" stroke-width="5" stroke-linecap="round"/>
  <!-- Top horizontal accent connecting the slashes -->
  <path d="M6 6 L44 6" stroke="url(#claw1)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
</svg>